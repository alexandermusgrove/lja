<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LJA x Glean</title>
  <style>
    :root {
      --lja-navy: #143156;
      --lja-blue: #67b1e2;
      --lja-cyan: #25bff0;
      --lja-ink: #10273f;
      --lja-muted: #5c6f82;
      --lja-line: #d7e5f1;
      --lja-panel: #f4f8fb;
      --lja-white: #ffffff;
      --max: 1180px;
      --r-xl: 28px;
      --r-lg: 20px;
      --r-md: 14px;
      --shadow: 0 18px 50px rgba(20,49,86,0.08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--lja-ink);
      background: linear-gradient(180deg, #f3f8fc 0%, #ffffff 180px, #ffffff 100%);
      line-height: 1.45;
    }

    .topbar {
      height: 10px;
      background: linear-gradient(90deg, var(--lja-navy), var(--lja-blue), var(--lja-cyan));
    }

    .shell {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(244,248,251,0.98));
      border: 1px solid var(--lja-line);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-inner {
      padding: 28px 30px 30px;
      position: relative;
    }

    .hero-inner::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--lja-navy), var(--lja-blue));
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .brand-logo {
      height: 44px;
      width: auto;
      display: block;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .brand-plus {
      font-size: 34px;
      line-height: 1;
      font-weight: 500;
      color: var(--lja-navy);
      margin-top: -2px;
      flex: 0 0 auto;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.72fr);
      gap: 26px;
      align-items: start;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 3.6vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--lja-navy);
      max-width: 100%;
    }

    .hero-sub {
      margin: 0;
      color: var(--lja-muted);
      font-size: 18px;
      line-height: 1.55;
      max-width: 100%;
    }

    .hero-copy {
      width: 100%;
      padding-right: 8px;
    }

    .stat-panel {
      border-radius: var(--r-lg);
      background: linear-gradient(180deg, var(--lja-navy), #1b416f);
      color: #f5fbff;
      padding: 22px;
      min-height: 100%;
      display: grid;
      gap: 16px;
      box-shadow: 0 18px 40px rgba(20,49,86,0.18);
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.72);
      margin-bottom: 8px;
    }

    .metric-grid {
      display: grid;
      gap: 14px;
    }

    .metric {
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.14);
    }

    .metric:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .metric strong {
      display: block;
      font-size: 27px;
      line-height: 1;
      margin-bottom: 5px;
      color: #ffffff;
      letter-spacing: -0.03em;
    }

    .metric span {
      display: block;
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      line-height: 1.45;
    }

    .section {
      margin-top: 24px;
      padding: 0 2px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 14px;
    }

    .kicker {
      margin: 0 0 6px;
      color: var(--lja-blue);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.02em;
      color: var(--lja-navy);
    }

    .subtle {
      margin: 0;
      max-width: 56ch;
      color: var(--lja-muted);
      font-size: 15px;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.25fr);
      gap: 18px;
      align-items: stretch;
    }

    .panel {
      background: var(--lja-white);
      border: 1px solid var(--lja-line);
      border-radius: var(--r-lg);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .logo-panel {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .logo-wrap {
      min-height: 118px;
      display: flex;
      align-items: flex-start;
    }

    .logo-wrap img {
      width: min(280px, 100%);
      height: auto;
      object-fit: contain;
      display: block;
    }

    .logo-copy {
      margin: auto 0 0;
      padding-top: 18px;
      font-size: clamp(18px, 1.9vw, 24px);
      line-height: 1.16;
      letter-spacing: -0.025em;
      color: var(--lja-navy);
      max-width: 100%;
      width: 100%;
      padding-right: 8px;
    }

    .challenge-list {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 12px;
      color: var(--lja-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .challenge-list li::marker {
      color: var(--lja-blue);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .what-card {
      background: linear-gradient(180deg, #ffffff, #f8fbfd);
      border: 1px solid var(--lja-line);
      border-radius: var(--r-md);
      padding: 16px;
    }

    .what-card h4,
    .outcome-card h4,
    .proof-card h4 {
      margin: 0 0 8px;
      font-size: 18px;
      color: var(--lja-navy);
      letter-spacing: -0.01em;
    }

    .what-card p,
    .outcome-card p,
    .proof-card p {
      margin: 0;
      color: var(--lja-muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .outcomes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .outcome-card,
    .proof-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff, #f7fbfe);
      border: 1px solid var(--lja-line);
      border-radius: var(--r-lg);
      padding: 20px 18px 18px;
      box-shadow: var(--shadow);
    }

    .outcome-card {
      min-height: 250px;
    }

    .proof-card {
      min-height: 220px;
    }

    .outcome-card::before,
    .proof-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--lja-navy), var(--lja-blue));
    }

    .outcome-num {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #eef6fc;
      color: var(--lja-blue);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      border: 1px solid #dceaf5;
    }

    .proof-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .proof-company {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--lja-blue);
      margin-bottom: 14px;
    }

    .proof-stat {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--lja-navy);
    }
